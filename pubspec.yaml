name: supermarket_system_codemagic
description: Supermarket Management System - Flutter App for Codemagic
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  
  # State Management
  riverpod: ^3.0.3
  flutter_riverpod: ^3.0.3
  
  # UI & Utils
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  
  # Barcode Scanner
  barcode_scan2: ^4.2.4
  
  # Printing & Export
  pdf: ^3.10.7
  printing: ^5.12.0
  csv: ^6.0.0
  open_file: ^3.3.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # HTTP
  http: ^1.1.2
  
  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700